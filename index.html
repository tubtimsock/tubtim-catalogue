<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tubtim Sock Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Prompt:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222222;
    --accent: #f5c842;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --border: #333;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo {
    font-family: 'Prompt', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent2); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #sync-btn {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  #sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  #sync-btn.loading { opacity: 0.5; pointer-events: none; }

  .search-bar {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }

  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--muted); }

  .category-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .category-tabs::-webkit-scrollbar { display: none; }

  .tab {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* ── MAIN ── */
  main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

  /* ── STATUS BANNER ── */
  .status-banner {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .status-banner .icon { font-size: 36px; margin-bottom: 12px; }
  .status-banner p { font-size: 15px; line-height: 1.6; }
  .status-banner .sub { font-size: 12px; margin-top: 6px; color: #555; }

  /* ── PRICE GROUPS ── */
  .price-group { margin-bottom: 32px; }

  .price-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .price-badge {
    background: var(--accent);
    color: #000;
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 18px;
    padding: 4px 14px;
    border-radius: 6px;
  }

  .price-count { color: var(--muted); font-size: 13px; }

  .price-line { flex: 1; height: 1px; background: var(--border); }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }

  /* ── PRODUCT CARD ── */
  .product-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }

  .product-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  .product-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #2a2a2a;
    display: block;
  }

  .product-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .product-info { padding: 8px 10px; }

  .product-name {
    font-size: 12px;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .product-sku { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    max-width: 380px;
    width: 100%;
    overflow: hidden;
  }

  .modal img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #2a2a2a;
  }

  .modal-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
  }

  .modal-body { padding: 18px; }

  .modal-name {
    font-family: 'Prompt', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .modal-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .modal-price {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 16px;
    padding: 3px 12px;
    border-radius: 5px;
  }

  .modal-category { color: var(--muted); font-size: 13px; }
  .modal-sku { color: var(--muted); font-size: 12px; margin-bottom: 6px; }

  .modal-details {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .detail-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 12px;
    color: #ccc;
  }

  .detail-chip strong { color: var(--accent); font-size: 11px; display: block; margin-bottom: 1px; }

  .modal-desc { font-size: 14px; color: #bbb; line-height: 1.5; }

  .modal-close {
    display: block;
    width: calc(100% - 36px);
    margin: 0 18px 18px;
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    cursor: pointer;
  }

  .no-results {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 16px;
  }

  /* ── LAST UPDATED ── */
  #last-updated {
    text-align: center;
    font-size: 11px;
    color: #444;
    padding: 20px 0 40px;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">TUBTIM <span>🧦</span></div>
    <div class="header-right">
      <div style="color:var(--muted);font-size:13px" id="total-count"></div>
      <button id="sync-btn" onclick="loadSheet()">↻ Sync</button>
    </div>
  </div>
  <input class="search-bar" type="text" placeholder="🔍 ค้นหาสินค้า..." id="search" oninput="render()">
  <div class="category-tabs" id="tabs"></div>
</header>

<main id="main">
  <div class="status-banner">
    <div class="icon">🔄</div>
    <p>กำลังโหลดข้อมูล...</p>
  </div>
</main>

<div id="last-updated"></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div id="modal-img-wrap"></div>
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-meta">
        <div class="modal-price" id="modal-price"></div>
        <div class="modal-category" id="modal-cat"></div>
      </div>
      <div class="modal-sku" id="modal-sku"></div>
      <div class="modal-details" id="modal-details"></div>
      <div class="modal-desc" id="modal-desc"></div>
    </div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">ปิด</button>
  </div>
</div>

<script>
// ============================================================
// 🔧 CONFIG — แก้ตรงนี้เท่านั้น
// ============================================================

// วิธีได้ URL:
//   Google Sheets → File → Share → Publish to web
//   → เลือก tab "Customer Catalog" → เลือก format "CSV" → Publish
//   → copy URL แล้ววางด้านล่าง
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtvHVguMqwVIh9kEuLZiNQW5GmS85mByVzCLUDTIgXq3lv2tmXgYnsZ8wK5peGzPSEtJU6kfwPfYuz/pub?gid=265091690&single=true&output=csv";

// Column names — ต้องตรงกับ header ใน Customer Catalog tab (row 1)
// ชื่อ header ใน sheet ของคุณ:
// SKU | Pic | Brand | Category | Product Name | Color | Style | Size | Made In | Per Pack | Sell/Pack (฿)
const COL = {
  SKU:       "SKU",
  PIC:       "Image URL",
  BRAND:     "Brand",
  CATEGORY:  "Category",
  NAME:      "Product Name",
  COLOR:     "Color",
  STYLE:     "Style",
  SIZE:      "Size",
  MADE_IN:   "Made In",
  PER_PACK:  "Per Pack",
  PRICE:     "Sell/Pack (฿)",
};

// ============================================================
// ⚙️ STATE
// ============================================================
let products = [];
let categories = [];
let activeCategory = "ทั้งหมด";

// ============================================================
// 📥 LOAD FROM SHEET
// ============================================================
async function loadSheet() {
  if (SHEET_URL === "YOUR_PUBLISHED_CSV_URL_HERE") {
    showConfigError();
    return;
  }

  const btn = document.getElementById('sync-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ กำลัง Sync...';

  try {
    // Cache-bust so we always get fresh data
    const url = SHEET_URL + (SHEET_URL.includes('?') ? '&' : '?') + '_cb=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    parseCSV(csv);
    saveToCache(csv);
    document.getElementById('last-updated').textContent =
      'อัปเดตล่าสุด: ' + new Date().toLocaleString('th-TH');
  } catch (e) {
    console.error(e);
    // Try loading from cache
    const cached = localStorage.getItem('tubtim_csv_cache');
    if (cached) {
      parseCSV(cached);
      document.getElementById('last-updated').textContent =
        '⚠️ โหลดจาก cache (offline) — ' + (localStorage.getItem('tubtim_cache_time') || '');
    } else {
      showError(e.message);
    }
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '↻ Sync';
  }
}

function saveToCache(csv) {
  try {
    localStorage.setItem('tubtim_csv_cache', csv);
    localStorage.setItem('tubtim_cache_time', new Date().toLocaleString('th-TH'));
  } catch(e) { /* storage full — skip */ }
}

// ============================================================
// 📊 CSV PARSER
// ============================================================
function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) { showError('ข้อมูลว่างเปล่า'); return; }

  // Find the header row — scan until we find a line containing "SKU"
  let headerRowIndex = 0;
  for (let i = 0; i < Math.min(lines.length, 5); i++) {
    if (lines[i].includes('SKU')) { headerRowIndex = i; break; }
  }
  const headers = splitCSVLine(lines[headerRowIndex]);

  // Map column names to indices
  const idx = {};
  Object.entries(COL).forEach(([key, colName]) => {
    const i = headers.findIndex(h => h.trim() === colName.trim());
    idx[key] = i; // -1 if not found
  });

  // Parse rows — start after header row
  products = [];
  for (let i = headerRowIndex + 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (cols.every(c => !c.trim())) continue; // skip blank rows

    const get = (key) => idx[key] >= 0 ? (cols[idx[key]] || '').trim() : '';

    const rawPrice = get('PRICE').replace(/[^0-9.]/g, '');
    const price = parseFloat(rawPrice);

    const p = {
      sku:      get('SKU'),
      image:    get('PIC'),
      brand:    get('BRAND'),
      category: get('CATEGORY'),
      name:     get('NAME'),
      color:    get('COLOR'),
      style:    get('STYLE'),
      size:     get('SIZE'),
      madeIn:   get('MADE_IN'),
      perPack:  get('PER_PACK'),
      price:    isNaN(price) ? 0 : price,
    };

    if (p.name) products.push(p);
  }

  // Build category list from actual data
  const catSet = new Set(products.map(p => p.category).filter(Boolean));
  categories = [...catSet];

  buildTabs();
  render();
}

// Handles quoted CSV fields (e.g., "value, with, commas")
function splitCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

// ============================================================
// 🎛️ TABS
// ============================================================
function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  ["ทั้งหมด", ...categories].forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; render(); updateTabs(); };
    tabsEl.appendChild(btn);
  });
}

function updateTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent === activeCategory);
  });
}

// ============================================================
// 🎨 RENDER
// ============================================================
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = activeCategory === "ทั้งหมด"
    ? products
    : products.filter(p => p.category === activeCategory);
  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.sku.toLowerCase().includes(q) ||
    p.color.toLowerCase().includes(q) ||
    p.style.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q)
  );
  return list;
}

function groupByPrice(list) {
  const map = {};
  list.forEach(p => {
    const key = p.price;
    if (!map[key]) map[key] = [];
    map[key].push(p);
  });
  return Object.entries(map)
    .sort((a, b) => Number(a[0]) - Number(b[0]))
    .map(([price, items]) => ({ price: Number(price), items }));
}

function render() {
  const list = getFiltered();
  const main = document.getElementById('main');
  document.getElementById('total-count').textContent = list.length + ' รายการ';

  if (!list.length && products.length > 0) {
    main.innerHTML = '<div class="no-results">ไม่พบสินค้า 🧦</div>';
    return;
  }

  if (!list.length) return; // still loading / error state

  const groups = groupByPrice(list);
  main.innerHTML = groups.map(({ price, items }) => `
    <div class="price-group">
      <div class="price-header">
        <div class="price-badge">${price > 0 ? price + ' ฿' : '—'}</div>
        <div class="price-count">${items.length} รายการ</div>
        <div class="price-line"></div>
      </div>
      <div class="product-grid">
        ${items.map(p => `
          <div class="product-card" onclick='openModal(${JSON.stringify(p).replace(/'/g, "&#39;")})'>
            ${p.image && isValidUrl(p.image)
              ? `<img src="${escHtml(p.image)}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              : ''
            }
            <div class="product-img-placeholder" style="${p.image && isValidUrl(p.image) ? 'display:none' : ''}">🧦</div>
            <div class="product-info">
              <div class="product-name">${escHtml(p.name)}</div>
              ${p.sku ? `<div class="product-sku">${escHtml(p.sku)}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ============================================================
// 🔍 MODAL
// ============================================================
function openModal(p) {
  const hasImg = p.image && isValidUrl(p.image);
  document.getElementById('modal-img-wrap').innerHTML = hasImg
    ? `<img src="${escHtml(p.image)}" alt="${escHtml(p.name)}" onerror="this.parentElement.innerHTML='<div class=modal-img-placeholder>🧦</div>'">`
    : `<div class="modal-img-placeholder">🧦</div>`;

  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-price').textContent = p.price > 0 ? p.price + ' ฿' : '—';
  document.getElementById('modal-cat').textContent = p.category;
  document.getElementById('modal-sku').textContent = p.sku ? 'รหัส: ' + p.sku : '';

  // Detail chips
  const chips = [];
  if (p.color)   chips.push({ label: 'สี', value: p.color });
  if (p.style)   chips.push({ label: 'สไตล์', value: p.style });
  if (p.size)    chips.push({ label: 'ไซส์', value: p.size });
  if (p.madeIn)  chips.push({ label: 'ผลิตที่', value: p.madeIn });
  if (p.perPack) chips.push({ label: 'ต่อแพ็ค', value: p.perPack + ' คู่' });
  if (p.brand)   chips.push({ label: 'แบรนด์', value: p.brand });

  document.getElementById('modal-details').innerHTML = chips.map(c =>
    `<div class="detail-chip"><strong>${c.label}</strong>${escHtml(c.value)}</div>`
  ).join('');

  document.getElementById('modal-desc').textContent = '';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

// ============================================================
// 🛠️ HELPERS
// ============================================================
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isValidUrl(str) {
  return str && (str.startsWith('http://') || str.startsWith('https://'));
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div class="status-banner">
      <div class="icon">⚠️</div>
      <p>โหลดข้อมูลไม่สำเร็จ</p>
      <p class="sub">${escHtml(msg)}</p>
      <p class="sub" style="margin-top:12px">กด Sync อีกครั้ง หรือตรวจสอบ SHEET_URL ใน config</p>
    </div>`;
}

function showConfigError() {
  document.getElementById('main').innerHTML = `
    <div class="status-banner">
      <div class="icon">🔧</div>
      <p>ยังไม่ได้ตั้งค่า SHEET_URL</p>
      <p class="sub" style="margin-top:8px">
        1. เปิด Google Sheets → File → Share → Publish to web<br>
        2. เลือก tab <strong>Customer Catalog</strong> → format <strong>CSV</strong><br>
        3. Copy URL แล้วแทนที่ค่า <code>SHEET_URL</code> ในไฟล์ HTML นี้
      </p>
    </div>`;
}

// ============================================================
// 🚀 INIT — load from cache first, then fetch fresh
// ============================================================
(function init() {
  buildTabs(); // empty tabs on start

  const cached = localStorage.getItem('tubtim_csv_cache');
  if (cached) {
    parseCSV(cached);
    document.getElementById('last-updated').textContent =
      'cache: ' + (localStorage.getItem('tubtim_cache_time') || '—') + ' (กำลัง sync...)';
  }

  loadSheet(); // always fetch fresh in background
})();
</script>
</body>
</html>
